<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080808; font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
.swatch { width: 120px; }
.color-block { height: 64px; border-radius: 8px; width: 100%; border: 1px solid rgba(255,255,255,0.06); }
.name { font-size: 11px; font-weight: 600; color: #F0F0F0; margin-top: 6px; }
.hex  { font-size: 10px; color: #888; margin-top: 2px; font-family: 'DM Mono', monospace; }
.role { font-size: 10px; color: #555; margin-top: 1px; }
</style></head><body>
<div class="swatch">
  <div class="color-block" style="background:#080808;"></div>
  <div class="name">BG Dark</div><div class="hex">#080808</div><div class="role">Scaffold</div>
</div>
<div class="swatch">
  <div class="color-block" style="background:#111111;"></div>
  <div class="name">Surface Dark</div><div class="hex">#111111</div><div class="role">Cards</div>
</div>
<div class="swatch">
  <div class="color-block" style="background:#1A1A1A;"></div>
  <div class="name">Surface Elevated</div><div class="hex">#1A1A1A</div><div class="role">Inputs, chips</div>
</div>
<div class="swatch">
  <div class="color-block" style="background:#2A2A2A;"></div>
  <div class="name">Border Dark</div><div class="hex">#2A2A2A</div><div class="role">Dividers</div>
</div>
<div class="swatch">
  <div class="color-block" style="background:#F0F0F0;"></div>
  <div class="name">Text Primary</div><div class="hex">#F0F0F0</div><div class="role">Body copy</div>
</div>
<div class="swatch">
  <div class="color-block" style="background:#888888;"></div>
  <div class="name">Text Secondary</div><div class="hex">#888888</div><div class="role">Meta labels</div>
</div>
<div class="swatch">
  <div class="color-block" style="background:#444444;"></div>
  <div class="name">Text Tertiary</div><div class="hex">#444444</div><div class="role">Disabled</div>
</div>
</body></html>
