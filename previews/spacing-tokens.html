<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111111; font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.row { display: flex; align-items: center; gap: 10px; }
.box { border-radius: 4px; background: #1B3A6B; }
.label { font-size: 11px; color: #888; font-family: 'DM Mono', monospace; width: 55px; }
.name  { font-size: 12px; color: #F0F0F0; font-weight: 600; width: 30px; }
</style></head><body>
<div class="row"><div class="name">xxs</div><div class="box" style="width:4px;height:20px"></div><div class="label">4px · gaps</div></div>
<div class="row"><div class="name">xs</div><div class="box" style="width:8px;height:20px"></div><div class="label">8px · chips</div></div>
<div class="row"><div class="name">sm</div><div class="box" style="width:12px;height:20px"></div><div class="label">12px · cards</div></div>
<div class="row"><div class="name">md</div><div class="box" style="width:16px;height:20px"></div><div class="label">16px · screen edge</div></div>
<div class="row"><div class="name">lg</div><div class="box" style="width:20px;height:20px"></div><div class="label">20px · detail</div></div>
<div class="row"><div class="name">xl</div><div class="box" style="width:24px;height:20px"></div><div class="label">24px · sections</div></div>
<div class="row"><div class="name">xxl</div><div class="box" style="width:32px;height:20px"></div><div class="label">32px · splash</div></div>
<div class="row"><div class="name">xxxl</div><div class="box" style="width:40px;height:20px"></div><div class="label">40px · hero</div></div>
</body></html>
