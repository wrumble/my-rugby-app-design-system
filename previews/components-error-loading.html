<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080808; font-family: 'DM Sans', sans-serif; padding: 24px; color: #F0F0F0; display: flex; gap: 16px; flex-wrap: wrap; }
.label { font-size: 10px; font-family: 'DM Mono', monospace; color: #555; margin-bottom: 10px; letter-spacing: 0.5px; text-transform: uppercase; }
.frame { width: 240px; height: 280px; background: #111; border-radius: 16px; padding: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; text-align: center; }
.icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; }
.icon svg { width: 48px; height: 48px; }
.msg { font-size: 14px; color: #F0F0F0; line-height: 1.5; }
.btn { background: #1B3A6B; color: #fff; padding: 11px 24px; border-radius: 32px; font-size: 14px; font-weight: 600; border: none; }
/* spinner */
.spinner { width: 36px; height: 36px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.12); border-top-color: #C8A44A; animation: spin 900ms linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.cup-spinner { width: 24px; height: 24px; position: relative; }
.cup-spinner span { position: absolute; left: 50%; top: 0; width: 2px; height: 6px; background: #888; border-radius: 1px; transform-origin: 1px 12px; opacity: 0.2; }
.cup-spinner span:nth-child(1) { transform: rotate(0deg); animation: cup 1s steps(8) infinite; }
@keyframes cup { from { opacity: 1; } to { opacity: 0.2; } }
.spinner-label { font-size: 11px; font-family: 'DM Mono', monospace; color: #555; margin-top: 4px; }
.cup-spinner span:nth-child(2) { transform: rotate(45deg); animation-delay: 0.125s; }
.cup-spinner span:nth-child(3) { transform: rotate(90deg); animation-delay: 0.25s; }
.cup-spinner span:nth-child(4) { transform: rotate(135deg); animation-delay: 0.375s; }
.cup-spinner span:nth-child(5) { transform: rotate(180deg); animation-delay: 0.5s; }
.cup-spinner span:nth-child(6) { transform: rotate(225deg); animation-delay: 0.625s; }
.cup-spinner span:nth-child(7) { transform: rotate(270deg); animation-delay: 0.75s; }
.cup-spinner span:nth-child(8) { transform: rotate(315deg); animation-delay: 0.875s; }
.cup-spinner span { animation: cup 1s steps(8, end) infinite; }
</style></head><body>

<div>
  <div class="label">ErrorView (with retry)</div>
  <div class="frame">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#E63946" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <div class="msg">Couldn&apos;t load the latest standings.</div>
    <button class="btn">Try again</button>
  </div>
</div>

<div>
  <div class="label">LoadingIndicator (Material)</div>
  <div class="frame">
    <div class="spinner"></div>
    <div class="spinner-label">Android / Web</div>
  </div>
</div>

<div>
  <div class="label">LoadingIndicator (Cupertino)</div>
  <div class="frame">
    <div class="cup-spinner">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="spinner-label">iOS</div>
  </div>
</div>

<div>
  <div class="label">OfflineBanner</div>
  <div class="frame" style="padding:0; align-items: stretch; justify-content: flex-start;">
    <div style="background:#B3261E;color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 16px;font-size:12px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
      No internet connection
    </div>
    <div style="padding:24px;font-size:11px;color:#555;font-family:'DM Mono',monospace;">app screen content below</div>
  </div>
</div>

</body></html>
