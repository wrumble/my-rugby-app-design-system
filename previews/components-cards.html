<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080808; font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
.card { background: #111111; border-radius: 16px; padding: 16px; width: 180px; box-shadow: 0 1px 2px rgba(0,0,0,0.4); }
.card--outlined { background: #111111; border: 1px solid #2A2A2A; box-shadow: none; }
.card--flat { background: #1A1A1A; box-shadow: none; }
.tag { font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.title { font-size: 13px; font-weight: 700; color: #F0F0F0; margin-bottom: 4px; }
.sub { font-size: 11px; color: #888; }
.img-placeholder { background: #1A1A1A; border-radius: 10px; height: 60px; margin-bottom: 10px; display:flex;align-items:center;justify-content:center; }
.img-placeholder span { font-size: 10px; color: #444; }
</style></head><body>
<div>
  <div style="font-size:10px;color:#555;margin-bottom:8px;font-family:'DM Mono',monospace">AppCard (filled)</div>
  <div class="card">
    <div class="img-placeholder"><span>Hero Image</span></div>
    <div class="tag">Match Report</div>
    <div class="title">Bath secure thrilling late win at The Rec</div>
    <div class="sub">2 hours ago</div>
  </div>
</div>
<div>
  <div style="font-size:10px;color:#555;margin-bottom:8px;font-family:'DM Mono',monospace">AppCard.outlined</div>
  <div class="card card--outlined">
    <div class="tag">Interview</div>
    <div class="title">Ben Spencer on the season so far</div>
    <div class="sub">Yesterday</div>
  </div>
</div>
<div>
  <div style="font-size:10px;color:#555;margin-bottom:8px;font-family:'DM Mono',monospace">AppCard.flat</div>
  <div class="card card--flat">
    <div class="tag">Preview</div>
    <div class="title">Bristol Bears — Premiership Preview</div>
    <div class="sub">Tomorrow · 15:00</div>
  </div>
</div>
</body></html>
