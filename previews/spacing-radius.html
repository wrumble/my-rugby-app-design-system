<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111111; font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
.item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.box { width: 60px; height: 60px; background: #1B3A6B; border: 1px solid rgba(255,255,255,0.1); }
.name { font-size: 11px; font-weight: 600; color: #F0F0F0; }
.val  { font-size: 10px; color: #888; font-family: 'DM Mono', monospace; }
.role { font-size: 10px; color: #555; text-align: center; }
</style></head><body>
<div class="item">
  <div class="box" style="border-radius:4px"></div>
  <div class="name">xs</div><div class="val">4px</div><div class="role">badges</div>
</div>
<div class="item">
  <div class="box" style="border-radius:10px"></div>
  <div class="name">sm</div><div class="val">10px</div><div class="role">images</div>
</div>
<div class="item">
  <div class="box" style="border-radius:16px"></div>
  <div class="name">md</div><div class="val">16px</div><div class="role">cards</div>
</div>
<div class="item">
  <div class="box" style="border-radius:24px"></div>
  <div class="name">lg</div><div class="val">24px</div><div class="role">sheets</div>
</div>
<div class="item">
  <div class="box" style="border-radius:32px"></div>
  <div class="name">pill</div><div class="val">32px</div><div class="role">buttons</div>
</div>
</body></html>
