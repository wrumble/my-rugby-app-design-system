<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0D0D1A; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.row { display: flex; align-items: baseline; gap: 16px; }
.specimen { font-family: 'DM Mono', monospace; color: #E0E0F0; }
.meta { font-family: 'DM Mono', monospace; font-size: 10px; color: #556677; white-space: nowrap; }
.dim { color: #8888AA; }
</style></head><body>
<div class="row">
  <div class="specimen" style="font-size:24px;font-weight:500">24 <span class="dim">–</span> 17</div>
  <div class="meta">monoLg · 24px · w500 · scores</div>
</div>
<div class="row">
  <div class="specimen" style="font-size:16px;font-weight:400">P  W  D  L  BP  Pts</div>
  <div class="meta">monoMd · 16px · standings headers</div>
</div>
<div class="row">
  <div class="specimen dim" style="font-size:16px;font-weight:400">22  19   1   2   8   85</div>
  <div class="meta">monoMd · stat row values</div>
</div>
<div class="row">
  <div class="specimen dim" style="font-size:12px;font-weight:400">72'</div>
  <div class="meta">monoSm · 12px · match minute</div>
</div>
</body></html>
