<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0D0D1A; font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
.swatch { width: 130px; }
.color-block { height: 64px; border-radius: 8px; width: 100%; border: 1px solid rgba(255,255,255,0.05); }
.name { font-size: 11px; font-weight: 600; color: #E0E0F0; margin-top: 6px; }
.hex  { font-size: 10px; color: #8888AA; margin-top: 2px; font-family: 'DM Mono', monospace; }
.role { font-size: 10px; color: #556677; margin-top: 1px; }
</style></head><body>
<div class="swatch">
  <div class="color-block" style="background:#0D0D1A;"></div>
  <div class="name">Navy 900</div><div class="hex">#0D0D1A</div><div class="role">Scaffold</div>
</div>
<div class="swatch">
  <div class="color-block" style="background:#1A1A2E;"></div>
  <div class="name">Navy 700</div><div class="hex">#1A1A2E</div><div class="role">Score banner</div>
</div>
<div class="swatch">
  <div class="color-block" style="background:#2A2A44;"></div>
  <div class="name">Navy 600</div><div class="hex">#2A2A44</div><div class="role">Cards</div>
</div>
<div class="swatch">
  <div class="color-block" style="background:#E63946;"></div>
  <div class="name">Red 500</div><div class="hex">#E63946</div><div class="role">LIVE / In Play</div>
</div>
<div class="swatch">
  <div class="color-block" style="background:#FFB74D;"></div>
  <div class="name">Amber 500</div><div class="hex">#FFB74D</div><div class="role">Half Time</div>
</div>
<div class="swatch">
  <div class="color-block" style="background:#E0E0F0;"></div>
  <div class="name">Text Primary</div><div class="hex">#E0E0F0</div><div class="role">Scores</div>
</div>
<div class="swatch">
  <div class="color-block" style="background:#8888AA;"></div>
  <div class="name">Text Secondary</div><div class="hex">#8888AA</div><div class="role">Team names</div>
</div>
</body></html>
