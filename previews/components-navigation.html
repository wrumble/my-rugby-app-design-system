<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; font-family: 'DM Sans', sans-serif; padding: 18px 20px; display: flex; flex-direction: column; gap: 20px; }
.label { font-family: 'DM Mono', monospace; font-size: 9px; color: #5A5A5A; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
.sub  { font-family: 'DM Mono', monospace; font-size: 8px; color: #3A3A3A; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
.row  { display: flex; gap: 16px; align-items: flex-start; }
.col  { display: flex; flex-direction: column; }

/* ── Bottom nav ── */
.nav { display: flex; width: 260px; padding: 6px 0 8px; }
.nav-dark  { background: #080808; border-top: 1px solid #222; }
.nav-light { background: #FFFFFF; border-top: 1px solid #E0E0E0; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.dot { width: 3px; height: 3px; border-radius: 2px; }

/* ── Match Hub tab bar ── */
.mh-tabs { display: flex; width: 260px; }
.mh-dark  { background: #12122A; border-bottom: 1px solid #1E1E3A; }
.mh-light { background: #F0F0F8; border-bottom: 1px solid #D0D0E8; }
.mh-tab { flex: 1; padding: 9px 2px; text-align: center; font-size: 10px; font-weight: 700; font-family: 'DM Sans', sans-serif; position: relative; cursor: pointer; }

@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.2} }
</style></head><body>

<div>
  <div class="label">Bottom NavigationBar — dark vs light</div>
  <div class="row">
    <div class="col">
      <div class="sub">Dark mode</div>
      <div class="nav nav-dark" id="nav-dark"></div>
    </div>
    <div class="col">
      <div class="sub">Light mode</div>
      <div class="nav nav-light" id="nav-light"></div>
    </div>
  </div>
</div>

<div>
  <div class="label">Match Hub Tab Bar — dark (navy) vs light</div>
  <div class="row">
    <div class="col">
      <div class="sub">Dark (navy700 — #12122A)</div>
      <div class="mh-tabs mh-dark" id="mh-dark"></div>
    </div>
    <div class="col">
      <div class="sub">Light (tinted surface)</div>
      <div class="mh-tabs mh-light" id="mh-light"></div>
    </div>
  </div>
</div>

<script>
const ACCENT = '#E91F8A'; // Harlequins — swappable per team

// ── Nav icons as SVG strings ─────────────────────────────────────────────────
function navIcon(index, color) {
  const s = '1.6'; const c = color;
  const icons = [
    `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="${s}" stroke-linecap="round"><rect x="4" y="3" width="16" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>`,
    `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="${s}" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/></svg>`,
    `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="${s}" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><polygon points="10,8 17,12 10,16" fill="${c}" stroke="none"/></svg>`,
    `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="${s}" stroke-linecap="round"><circle cx="12" cy="8" r="3.5"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`,
  ];
  return icons[index];
}

function buildNav(containerId, isDark, activeIndex=0) {
  const labels = ['News','Table','Videos','Profile'];
  const activeBg = isDark ? `rgba(233,31,138,0.10)` : `rgba(233,31,138,0.08)`;
  const inactiveColor = isDark ? '#5A5A5A' : '#BBBBBB';
  const activeColor = ACCENT;

  const container = document.getElementById(containerId);
  container.innerHTML = labels.map((lbl, i) => {
    const active = i === activeIndex;
    const col = active ? activeColor : inactiveColor;
    return `
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;padding:2px 0">
        ${active ? `<div style="position:absolute;top:4px;width:36px;height:24px;border-radius:8px;background:${activeBg}"></div>` : ''}
        <div style="position:relative;z-index:1">${navIcon(i, col)}</div>
        <span style="font-size:10px;font-weight:${active?700:400};color:${col};font-family:'DM Sans',sans-serif">${lbl}</span>
      </div>`;
  }).join('');
}

function buildMHTabs(containerId, isDark, activeIndex=0) {
  const tabs = ['Live','Stadium','Journey','Programme'];
  const activeColor   = isDark ? '#FF6B78' : '#C2364A'; // AA on both backgrounds
  const inactiveColor = isDark ? '#8A8AB0' : '#9090B0';
  const underlineBg   = isDark ? '#FF6B78' : '#C2364A';

  const container = document.getElementById(containerId);
  container.innerHTML = tabs.map((t, i) => {
    const active = i === activeIndex;
    return `
      <div style="flex:1;padding:9px 2px;text-align:center;font-size:10px;font-weight:${active?700:500};color:${active?activeColor:inactiveColor};font-family:'DM Sans',sans-serif;position:relative">
        ${t}
        ${active ? `<div style="position:absolute;bottom:0;left:15%;right:15%;height:2px;background:${underlineBg};border-radius:2px 2px 0 0"></div>` : ''}
      </div>`;
  }).join('');
}

buildNav('nav-dark', true, 0);
buildNav('nav-light', false, 0);
buildMHTabs('mh-dark', true, 0);
buildMHTabs('mh-light', false, 0);
</script>
</body></html>
